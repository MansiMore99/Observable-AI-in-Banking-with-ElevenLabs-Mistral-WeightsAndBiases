<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SecureBank AI Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: '#f0f9ff',
                100: '#e0f2fe',
                500: '#0ea5e9',
                600: '#0284c7',
                700: '#0369a1',
                800: '#075985',
                900: '#0c4a6e',
              }
            },
            fontFamily: {
              sans: ['Segoe UI', 'system-ui', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <style>
      * { box-sizing: border-box; }
      body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: #050d1a;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

      /* Typing dots for dark theme */
      .typing-dot-pulse {
        animation: pulse-dot 1.2s infinite ease-in-out both;
      }
      .typing-dot-pulse:nth-child(2) { animation-delay: 0.2s; }
      .typing-dot-pulse:nth-child(3) { animation-delay: 0.4s; }

      @keyframes pulse-dot {
        0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
        40% { opacity: 1; transform: scale(1); }
      }

      /* Legacy typing dot */
      .typing-dot {
        animation: typing 1.4s infinite ease-in-out both;
      }
      .typing-dot:nth-child(1) { animation-delay: -0.32s; }
      .typing-dot:nth-child(2) { animation-delay: -0.16s; }

      @keyframes typing {
        0%, 80%, 100% { transform: scale(0); }
        40% { transform: scale(1); }
      }

      /* Demo menu item hover */
      .demo-menu-item { transition: background 0.15s; }
      .demo-menu-item:hover { background: rgba(26, 111, 255, 0.08); }

      /* Quick chip hover */
      .quick-chip-btn { transition: background 0.15s, border-color 0.15s; }
      .quick-chip-btn:hover {
        background: rgba(26, 111, 255, 0.2) !important;
        border-color: rgba(26, 111, 255, 0.5) !important;
      }

      /* Message input focus */
      .msg-input::placeholder { color: #4a6080; }
    </style>
  </head>
  <body>
    <div id="root" style="height: 100vh;"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
